workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    environment:
      android_signing:
        - BW
      groups:
        - BW
      vars:
        PACKAGE_NAME: "com.barikwrapped.barikwrapped"
      node: 22.11.0
      java: 21
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build Next.js app
        script: |
          npm run build
      - name: Update Capacitor dependencies
        script: |
          npx cap sync android
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
      - name: Build Android Release APK (signed)
        script: |
          cd android
          ./gradlew assembleRelease
      - name: Build Android Bundle (signed)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
        release_name: "Build #$CM_BUILD_NUMBER - $(date '+%Y-%m-%d %H:%M')"
      email:
        recipients:
            - dani@danialonso.dev
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: You_Suite
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.barikwrapped.barikwrapped
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.barikwrapped.barikwrapped"
      node: 22.11.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build Next.js app
        script: |
          npm run build
      - name: Update Capacitor dependencies
        script: |
          npx cap sync ios
      - name: Set build number
        script: |
          BUILD_NUMBER=$(($CM_BUILD_NUMBER + 100))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS archive
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Elorrieta
          - Internal Testers
          - Testing
        submit_to_app_store: true
      email:
        recipients:
            - dani@danialonso.dev
        notify:
          success: true
          failure: true



